<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Submission Form</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="page-shell">
    <section class="card">
      <p class="eyebrow">MongoDB Form Demo</p>
      <h1>Send Your Details</h1>
      <p class="intro">Fill out the form below. Your data will be sent to the Python API and saved in MongoDB.</p>

      <form id="submission-form" class="form">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your full name" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" type="tel" placeholder="+91 98765 43210" required>

        <button type="submit">Submit</button>
      </form>

      <p id="status-message" class="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
